name: Kryon CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  python-tests:
    name: Python reference tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest
      - name: Run pytest
        run: python -m pytest -q
      - name: Run CLI self-test
        run: kryon --self-test
      - name: Run deterministic fuzz smoke
        run: python scripts/fuzz_smoke.py --cases 64 --max-size 2048 --out docs/reports/fuzz_smoke_ci.json
      - name: Run analysis smoke
        run: |
          python scripts/reduced_attack_automation.py --mode sweep --rounds 1,2,3 --digest-bits 8 --attempts 1024 --out docs/reports/reduced_attack_ci.json
          python scripts/toy_smt_model.py --variable-bits 9 --digest-bits 8 --rounds 1 --out docs/reports/toy_smt_ci.json
          python scripts/differential_clustering.py --profile smoke --max-cases 12 --max-mutations 2 --out docs/reports/differential_clustering_ci.json

  rust-tests:
    name: Rust native parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo test
        working-directory: native/rust
        run: cargo test --locked
      - name: Rust KAT example
        working-directory: native/rust
        run: cargo run --example kryon_kat --locked
      - name: Rust benchmark smoke
        working-directory: native/rust
        run: cargo run --release --example kryon_bench -- 128 1024

  c-tests:
    name: C native parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python package
        run: python -m pip install -e .
      - name: Build and run C KAT
        run: python scripts/c_kat.py --out docs/reports/c_kat_ci.json
      - name: Build and run C corpus parity
        run: python scripts/c_corpus_parity.py --profile smoke --out docs/reports/c_corpus_parity_ci.json

  final-release-gate:
    name: Final v1 release gate
    runs-on: ubuntu-latest
    needs: [python-tests, rust-tests, c-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest
      - name: Generate parity and release reports
        run: |
          python scripts/native_kat.py
          python scripts/parity_runner.py --timeout 180
          python scripts/parity_corpus_runner.py --profile smoke --timeout 180
          python scripts/release_check.py --run-pytest --run-cargo --run-c
          python scripts/final_audit.py --run-cargo
