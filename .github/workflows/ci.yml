name: Kryon CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Run tests
        run: python -m pytest -q

      - name: Run CLI self-test
        run: kryon --self-test

  c-native:
    name: C native reference
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python package
        run: python -m pip install -e .

      - name: Run C KAT
        run: python scripts/c_kat.py --out docs/reports/c_kat_ci.json

      - name: Run C corpus parity
        run: python scripts/c_corpus_parity.py --profile smoke --out docs/reports/c_corpus_parity_ci.json

  rust-native:
    name: Rust native reference
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo test
        working-directory: native/rust
        run: cargo test --locked

      - name: Run Rust KAT example
        working-directory: native/rust
        run: cargo run --example kryon_kat --locked

      - name: Run Rust benchmark smoke
        working-directory: native/rust
        run: cargo run --release --example kryon_bench -- 64 1024

  release-smoke:
    name: Release smoke
    runs-on: ubuntu-latest
    needs: [python-tests, c-native, rust-native]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Run lightweight release check
        run: python scripts/release_check.py --profile smoke --out docs/reports/release_check_ci.json
