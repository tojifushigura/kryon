name: Package check

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "kryon/**"
      - "README.md"
      - "LICENSE"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - run: python -m twine check dist/*
